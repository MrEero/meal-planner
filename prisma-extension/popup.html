<!doctype html>
<html lang="et">
<head>
<meta charset="utf-8"/>
<title>Perekonna Ostuabi</title>
<style>
  :root { --ink:#141311; --muted:#787067; --line:#e7e2d8; --accent:#b8562f; --bg:#faf7f0; }
  html,body { margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--ink); width:280px; }
  .wrap { padding:14px 14px 12px; }
  h1 { font-size:14px; font-weight:600; margin:0 0 8px; letter-spacing:-0.01em; }
  .muted { color:var(--muted); font-size:11px; }
  .row { display:flex; justify-content:space-between; align-items:baseline; font-size:12px; padding:4px 0; border-bottom:1px solid var(--line); }
  .row:last-of-type { border-bottom:none; }
  .val { font-variant-numeric:tabular-nums; font-weight:600; }
  .msg { font-size:11px; color:var(--muted); margin:8px 0 10px; min-height:14px; line-height:1.35; }
  button { width:100%; padding:8px; font-size:12px; border:1px solid var(--line); background:#fff; border-radius:6px; cursor:pointer; color:var(--ink); }
  button:hover { background:#f4efe4; }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:10px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; }
  .pill.on { background:var(--accent); color:#fff; }
  .pill.off { background:var(--line); color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Perekonna Ostuabi</h1>
  <div class="muted" style="margin-bottom:8px;">Lisab tooteid Prisma ostukorvi.</div>
  <div class="row"><span>Olek</span><span class="val"><span id="state" class="pill off">puhkab</span></span></div>
  <div class="row"><span>Järjekorras</span><span class="val" id="q">0</span></div>
  <div class="row"><span>Lisatud</span><span class="val" id="d">0</span></div>
  <div class="row"><span>Vahele jäänud</span><span class="val" id="f">0</span></div>
  <div class="msg" id="msg"></div>
  <button id="clear">Tühjenda järjekord</button>
</div>
<script src="popup.js"></script>
</body>
</html>
