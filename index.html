  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perekonna Toiduplaan</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root{
      --bg:#F6F1EA;
      --surface:#FFFFFF;
      --surface-2:#FBF7F1;
      --ink:#1F1D1A;
      --ink-2:#3D3A36;
      --muted:#7C7770;
      --muted-2:#A8A299;
      --line:#E8E0D4;
      --line-strong:#D9D0C1;
      --accent:#D8553A;
      --accent-soft:#F7E3DC;
      --accent-deep:#B33E25;
      --lock:#8B7D5C;
      --ok:#5F7A58;
      --warn:#C67A2E;
    }
    html,body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;margin:0}
    body{font-family:'Inter',system-ui,sans-serif}
    .serif{font-family:'Instrument Serif',Georgia,serif;font-weight:400}

    /* ——— Surfaces ——— */
    .pp-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;transition:border-color .15s}
    .pp-card:hover{border-color:var(--line-strong)}
    .pp-card-quiet{background:var(--surface-2);border:1px solid var(--line);border-radius:12px}
    .pp-divider{border-bottom:1px dashed var(--line)}

    /* ——— Buttons ——— */
    .pp-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;font-size:14px;font-weight:500;transition:all .15s;border:1px solid transparent;cursor:pointer}
    .pp-btn-dark{background:var(--ink);color:var(--bg)}
    .pp-btn-dark:hover{background:#000;transform:translateY(-1px)}
    .pp-btn-outline{background:var(--surface);color:var(--ink);border-color:var(--line-strong)}
    .pp-btn-outline:hover{border-color:var(--ink)}
    .pp-btn-ghost{color:var(--ink-2)}
    .pp-btn-ghost:hover{background:rgba(0,0,0,.04)}
    .pp-btn-accent{background:var(--accent);color:#fff}
    .pp-btn-accent:hover{background:var(--accent-deep)}

    /* ——— Chips / tags ——— */
    .pp-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;background:var(--surface);border:1px solid var(--line);border-radius:999px;font-size:12px;color:var(--ink-2);font-weight:500}
    .pp-chip-muted{color:var(--muted);background:transparent}
    .pp-chip-active{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.04)}

    /* ——— Segmented ——— */
    .pp-seg{display:inline-flex;background:var(--surface-2);padding:3px;border-radius:999px;border:1px solid var(--line)}
    .pp-seg>button{padding:7px 14px;border-radius:999px;font-size:13px;color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all .15s;font-weight:500}
    .pp-seg>button.is-on{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.04)}

    /* ——— Text helpers ——— */
    .pp-eyebrow{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
    .pp-muted{color:var(--muted)}
    .pp-ink{color:var(--ink)}
    .pp-ink-2{color:var(--ink-2)}
    .pp-accent{color:var(--accent)}
    .pp-tabular{font-variant-numeric:tabular-nums}

    /* ——— Day column ——— */
    .pp-day-name{font-family:'Instrument Serif',Georgia,serif;font-style:italic;font-size:34px;line-height:.95;letter-spacing:0.035em;font-weight:400;color:var(--ink)}
    .pp-day-name.today{color:var(--accent)}
    .pp-day-date{color:var(--muted);font-size:10.5px;font-variant-numeric:tabular-nums;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-top:6px}
    .pp-day-sum{display:inline-flex;align-items:baseline;gap:4px;padding:4px 10px;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;font-size:12px;color:var(--ink-2);font-variant-numeric:tabular-nums;font-weight:500}
    .pp-day-sum strong{color:var(--ink);font-weight:600}

    /* ——— Meal ——— */
    .pp-meal-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:6px}
    .pp-meal-label .pp-dot{width:5px;height:5px;border-radius:50%;background:var(--muted-2)}
    .pp-meal-label.breakfast .pp-dot{background:#E2A63B}
    .pp-meal-label.lunch .pp-dot{background:#7C9DC9}
    .pp-meal-label.dinner .pp-dot{background:var(--accent)}
    .pp-meal-name{font-size:15px;font-weight:500;color:var(--ink);line-height:1.35;cursor:pointer}
    .pp-meal-name:hover{text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px;text-decoration-color:var(--line-strong)}
    .pp-meal-foot{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:8px}

    .pp-icon-btn{width:26px;height:26px;border-radius:7px;display:inline-grid;place-items:center;color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all .15s}
    .pp-icon-btn:hover{background:rgba(0,0,0,.05);color:var(--ink)}
    .pp-icon-btn.locked{color:var(--lock)}

    .pp-leftover{background:var(--surface-2);border-radius:10px;padding:10px 12px;border:1px dashed var(--line-strong)}
    .pp-leftover .pp-meal-name{font-size:14px;color:var(--ink-2);font-weight:500}

    /* ——— Today highlight ——— */
    .pp-day-today{border-color:var(--accent) !important;background:linear-gradient(180deg,var(--accent-soft) 0%,var(--surface) 55%) !important}

    /* ——— Cost dots ——— */
    .pp-cost{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--muted);font-weight:500}
    .pp-cost .cd{width:6px;height:6px;border-radius:50%;display:inline-block}
    .pp-cost.cheap .cd{background:#7FA779}
    .pp-cost.mid .cd{background:#D9B25C}
    .pp-cost.exp .cd{background:var(--accent)}

    /* ——— Toast ——— */
    .pp-toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:var(--bg);padding:11px 18px 11px 14px;border-radius:999px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;box-shadow:0 12px 36px -10px rgba(31,29,26,.45);z-index:80;opacity:0;animation:pp-toast-in .25s ease-out forwards,pp-toast-out .35s ease-in 2.2s forwards}
    .pp-toast-err{background:#a23a2a}
    @keyframes pp-toast-in{to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes pp-toast-out{to{opacity:0;transform:translateX(-50%) translateY(8px)}}

    /* ——— Overlay / modals ——— */
    .pp-overlay{position:fixed;inset:0;background:rgba(31,29,26,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50}
    .pp-modal{background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:0 30px 80px -20px rgba(31,29,26,.25);max-width:640px;width:100%;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
    .pp-modal-head{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:var(--surface-2)}
    .pp-modal-title{font-family:'Instrument Serif',serif;font-size:26px;letter-spacing:-0.01em}
    .pp-modal-body{padding:22px 24px;overflow-y:auto;flex:1}

    /* ——— Inputs ——— */
    .pp-input{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--line-strong);border-radius:10px;font-size:14px;color:var(--ink);transition:all .15s;font-family:inherit}
    .pp-input:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px var(--accent-soft)}

    /* ——— Toggle switch ——— */
    .pp-switch{width:36px;height:20px;border-radius:999px;background:var(--line-strong);position:relative;cursor:pointer;transition:background .15s;flex-shrink:0}
    .pp-switch.on{background:var(--ink)}
    .pp-switch::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.15);transition:transform .18s cubic-bezier(.4,.2,.2,1)}
    .pp-switch.on::after{transform:translateX(16px)}

    /* ——— Shopping list ——— */
    .pp-shop-cat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
    .pp-shop-cat h3{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 12px;font-weight:600}
    .pp-shop-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}

    /* ——— Link ——— */
    .pp-link{color:var(--ink);border-bottom:1px solid var(--line);padding-bottom:1px;transition:border-color .15s;text-decoration:none}
    .pp-link:hover{border-color:var(--ink)}

    /* ——— Scroll tweaks for modals ——— */
    .pp-scroll::-webkit-scrollbar{width:8px}
    .pp-scroll::-webkit-scrollbar-track{background:transparent}
    .pp-scroll::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:999px}

    /* ——— Utility overrides for parts still using Tailwind colors ——— */
    .pp-table{width:100%;border-collapse:collapse}
    .pp-table th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--surface-2)}
    .pp-table td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px;color:var(--ink-2)}
    .pp-table tbody tr:hover{background:var(--surface-2)}
    .pp-table tbody tr:last-child td{border-bottom:none}
  </style>
</head>

  {id:"no-soups",name:"Ei suppe",description:"Jäta supid menüüst välja.",enabled:true,builtin:true},
];
const PAYDAY=10;
const UNIT_MAP={g:"g",kg:"kg",ml:"ml",dl:"dl",l:"l",tl:"g",spl:"g",kl:"g",tk:"g",pk:"g",viilu:"g",peotäit:"g"};

const CATEGORIES={
  "Liha ja kala":["hakkliha","peekon","sink","räim","lõhe","forell","latikas","tuunikala","vürtsikilu","kana"],
  "Piimatooted":["juust","feta","halloumi","grilljuust","parmesani","ricotta","valgehallitus","sulatatud juust","juku","kodujuust","kohupiim","kohupiimakreem","kohupiimapasta","hapukoor","jogurt","kreeka jogurt","kohvikoor","vahukoor","köögikoor","piim","või","kookosjook"],
  "Puu- ja köögivili":["banaan","õun","apelsin","virsik","mango","maasika","mustika","vaarika","põldmarja","avokaado","tomat","kirsst","paprika","kurk","porgand","suvikõrvits","baklažaan","kartul","bataat","kõrvits","nuikapsas","spinat","lehtsalat","rukola","roheline salat","idud","šampinjon","herned","sibul","mugulsibul","küüslauk","roheline sibul","datlid","aprikoos"],
  "Maiustused":["šokolaad","kakao","kakaonibsid","toorkakao","kookospalmisuhkur","mesi","vahtrasiirup","rosinad","goji"],
};
const EGG_KEYWORDS=["muna, koorega","munavalge"];
const EGG_WEIGHT=60;

function categorize(name){
  const low=name.toLowerCase();
  for(const [cat,keywords] of Object.entries(CATEGORIES)){
    if(keywords.some(kw=>low.includes(kw)))return cat;
  }
  return "Muu";
}

function isSoup(r){return SOUP_KEYWORDS.some(kw=>r.name.toLowerCase().includes(kw));}
function estimateCost(r){const t=(r.name+" "+r.ingredients).toLowerCase();let s=0;EXPENSIVE_KEYWORDS.forEach(kw=>{if(t.includes(kw))s+=2;});CHEAP_KEYWORDS.forEach(kw=>{if(t.includes(kw))s-=1;});return s;}
function getBudgetPhase(mon){const d=mon.getDate();return(d>=PAYDAY&&d<PAYDAY+14)?"normal":"budget";}
const RECIPE_COSTS=RECIPES.map(r=>({...r,cost:estimateCost(r)}));
const BUDGET_THRESHOLD=0;

function getNextMonday(){const today=new Date();const day=today.getDay();const diff=(1-day+7)%7||7;const m=new Date(today.getFullYear(),today.getMonth(),today.getDate()+diff);return m;}
function formatDateRange(s,e){return `${s.getDate()}.${s.getMonth()+1} - ${e.getDate()}.${e.getMonth()+1}.${e.getFullYear()}`;}
function normalizeUnit(raw){return UNIT_MAP[raw]||raw;}
function formatQuantity(qty,unit){if(unit==="g"&&qty>=1000)return{qty:Math.round((qty/1000)*100)/100,unit:"kg"};if(unit==="ml"&&qty>=1000)return{qty:Math.round((qty/1000)*100)/100,unit:"l"};return{qty:Math.round(qty*10)/10,unit};}
function parseIngredients(str){const ings={};str.split(", ").forEach(part=>{const m=part.match(/^(\d+(?:\.\d+)?)(.*?)\s+(.+)$/);if(m){const qty=parseFloat(m[1]);const unit=normalizeUnit(m[2].trim());const name=m[3].trim();const key=name.toLowerCase();if(!ings[key])ings[key]={name,quantity:0,unit};ings[key].quantity+=qty;}});return ings;}

function MealPlanner(){
  const baseMonday=getNextMonday();
  const [weekOffset,setWeekOffset]=useState(0);
  const nextMonday=useMemo(()=>{const m=new Date(baseMonday);m.setDate(baseMonday.getDate()+weekOffset*7);return m;},[baseMonday,weekOffset]);
  const budgetPhase=getBudgetPhase(nextMonday);
  const [budgetMode,setBudgetMode]=useState(budgetPhase);
  const [rules,setRules]=useState(DEFAULT_RULES);
  const [customRules,setCustomRules]=useState([]);
  const allRules=useMemo(()=>[...rules,...customRules],[rules,customRules]);
  const isRuleOn=useCallback(id=>allRules.find(r=>r.id===id)?.enabled??false,[allRules]);
  const toggleRule=useCallback(id=>{setRules(p=>p.map(r=>r.id===id?{...r,enabled:!r.enabled}:r));setCustomRules(p=>p.map(r=>r.id===id?{...r,enabled:!r.enabled}:r));},[]);
  const addCustomRule=useCallback((name,desc)=>{setCustomRules(p=>[...p,{id:"custom-"+Date.now(),name,description:desc,enabled:true,builtin:false}]);},[]);
  const removeCustomRule=useCallback(id=>{setCustomRules(p=>p.filter(r=>r.id!==id));},[]);
  const filteredRecipes=useMemo(()=>budgetMode==="normal"?RECIPE_COSTS:RECIPE_COSTS.filter(r=>r.cost<=BUDGET_THRESHOLD),[budgetMode]);

  // Weights — manual entry for now, persisted in localStorage.
  // TODO(withings): swap localStorage read with a fetch to a backend proxy that
  // holds the Withings client_secret and returns the latest /measure result.
  // See: https://developer.withings.com/api-reference/#tag/measure  (endpoint: measure?action=getmeas, meastype=1)
  const [weights,setWeights]=useState(()=>{try{const s=localStorage.getItem("pp.weights");return s?JSON.parse(s):{Liisbeth:66,Evert:76};}catch{return {Liisbeth:66,Evert:76};}});
  useEffect(()=>{try{localStorage.setItem("pp.weights",JSON.stringify(weights));}catch{}},[weights]);
  const [editingWeight,setEditingWeight]=useState(null);
  const [weightDraft,setWeightDraft]=useState("");
  const startEditWeight=name=>{setWeightDraft(String(weights[name]??""));setEditingWeight(name);};
  const commitWeight=()=>{const v=parseFloat(weightDraft.replace(",","."));if(!isNaN(v)&&v>30&&v<200&&editingWeight){setWeights(p=>({...p,[editingWeight]:Math.round(v*10)/10}));}setEditingWeight(null);setWeightDraft("");};

  const [plan,setPlan]=useState({breakfasts:[52,43,64,13,34],dinners:[59,18,16,8,38,39]});
  const nextFriday=new Date(nextMonday);
  nextFriday.setDate(nextMonday.getDate()+4);
  const dateRange=formatDateRange(nextMonday,nextFriday);

  const [locked,setLocked]=useState({});
  const [savedMenus,setSavedMenus]=useState([{id:1,label:"30.3 - 3.4.2026",savedAt:"29.03.2026 12:00",plan:{breakfasts:[52,43,64,13,34],dinners:[59,18,16,8,38,39]}}]);
  const [view,setView]=useState("edit");
  const [swapDay,setSwapDay]=useState(null);
  const [swapType,setSwapType]=useState(null);
  const [viewRecipe,setViewRecipe]=useState(null);
  const [toast,setToast]=useState(null);
  useEffect(()=>{if(!toast)return;const id=setTimeout(()=>setToast(null),2600);return()=>clearTimeout(id);},[toast]);
  const showToast=useCallback((message,kind="ok")=>setToast({message,kind,id:Date.now()}),[]);

  const pickFromPool=useCallback((pool,used)=>{const av=pool.filter(r=>!used.has(r.id));const src=av.length>0?av:pool;return src[Math.floor(Math.random()*src.length)].id;},[]);

  const generateNewPlan=useCallback(()=>{
    const noDupes=isRuleOn("no-duplicates");
    const dinnerIsCooking=isRuleOn("dinner-is-cooking");
    const minPrep=isRuleOn("min-prep-dinner");
    const noSoups=isRuleOn("no-soups");
    let bkPool=filteredRecipes.filter(r=>r.type==="breakfast"||r.type==="snack");
    let dnPool=filteredRecipes.filter(r=>r.type==="main");
    if(noSoups){bkPool=bkPool.filter(r=>!isSoup(r));dnPool=dnPool.filter(r=>!isSoup(r));}
    if(minPrep){const f=dnPool.filter(r=>r.prepTime>=15);if(f.length>=6)dnPool=f;}
    setPlan(prev=>{
      const used=new Set();
      const newD=[];
      for(let i=0;i<6;i++){if(prev.dinners[i]!==undefined&&locked[`dinner-${i}`]){newD.push(prev.dinners[i]);if(noDupes)used.add(prev.dinners[i]);}else{const p=pickFromPool(dnPool,noDupes?used:new Set());newD.push(p);if(noDupes)used.add(p);}}
      const newB=[];
      for(let i=0;i<5;i++){if(prev.breakfasts[i]!==undefined&&locked[`breakfast-${i}`]){newB.push(prev.breakfasts[i]);if(noDupes)used.add(prev.breakfasts[i]);}else{const p=pickFromPool(bkPool,noDupes?used:new Set());newB.push(p);if(noDupes)used.add(p);}}
      return{breakfasts:newB,dinners:newD};
    });
    setWeekOffset(o=>o+1);
  },[locked,filteredRecipes,isRuleOn,pickFromPool]);

  const getR=useCallback(id=>RECIPES.find(r=>r.id===id),[]);
  const getCost=useCallback(id=>RECIPE_COSTS.find(r=>r.id===id)?.cost??0,[]);
  const toggleLock=useCallback(key=>setLocked(p=>({...p,[key]:!p[key]})),[]);

  const saveCurrentMenu=useCallback(()=>{
    const now=new Date();
    setSavedMenus(p=>[{id:Date.now(),label:dateRange,savedAt:now.toLocaleDateString("et-EE")+" "+now.toLocaleTimeString("et-EE",{hour:"2-digit",minute:"2-digit"}),plan:{breakfasts:[...plan.breakfasts],dinners:[...plan.dinners]}},...p]);
    showToast("Menüü salvestatud");
  },[plan,dateRange,showToast]);
  const loadSavedMenu=useCallback(sp=>{setPlan({breakfasts:[...sp.breakfasts],dinners:[...sp.dinners]});},[]);
  const deleteSavedMenu=useCallback(id=>{setSavedMenus(p=>p.filter(m=>m.id!==id));},[]);
  const importMenus=useCallback(json=>{try{const data=JSON.parse(json);if(Array.isArray(data)){setSavedMenus(data);return true;}return false;}catch{return false;}},[]);
  const exportMenus=useCallback(()=>JSON.stringify(savedMenus),[savedMenus]);

  const swapMeal=useCallback(newId=>{
    if(swapType==="breakfast")setPlan(p=>({...p,breakfasts:p.breakfasts.map((id,i)=>i===swapDay?newId:id)}));
    else if(swapType==="lunch")setPlan(p=>({...p,dinners:p.dinners.map((id,i)=>i===swapDay?newId:id)}));
    else if(swapType==="dinner")setPlan(p=>({...p,dinners:p.dinners.map((id,i)=>i===swapDay+1?newId:id)}));
    setSwapDay(null);setSwapType(null);
  },[swapDay,swapType]);

  const swapOptions=useMemo(()=>swapType==="breakfast"?RECIPES.filter(r=>r.type==="breakfast"||r.type==="snack"):RECIPES.filter(r=>r.type==="main"),[swapType]);

  const shoppingList=useMemo(()=>{
    const all={};const NUM_PEOPLE=2;const DL=["E","T","K","N","R"];
    const add=(recipe,mc,tag)=>{const ings=parseIngredients(recipe.ingredients);Object.entries(ings).forEach(([k,ing])=>{const sq=ing.quantity*mc*NUM_PEOPLE;if(!all[k]){all[k]={name:ing.name,quantity:sq,unit:ing.unit,meals:[]};}else{all[k].quantity+=sq;}if(!all[k].meals.includes(tag))all[k].meals.push(tag);});};
    plan.breakfasts.forEach((id,i)=>add(getR(id),1,DL[i]+" hommik"));
    plan.dinners.forEach((id,idx)=>{
      if(idx===0){add(getR(id),1,DL[0]+" lõuna");}
      else if(idx===plan.dinners.length-1){add(getR(id),1,DL[idx-1]+" õhtu");}
      else{add(getR(id),1,DL[idx-1]+" õhtu");add(getR(id),1,DL[idx]+" lõuna");}
    });
    return Object.values(all).map(ing=>{
      const isEgg=EGG_KEYWORDS.some(kw=>ing.name.toLowerCase().includes(kw));
      const f=isEgg?{qty:Math.round(ing.quantity/EGG_WEIGHT),unit:"tk"}:formatQuantity(ing.quantity,ing.unit);
      return{name:ing.name,quantity:f.qty,unit:f.unit,meals:ing.meals,category:categorize(ing.name)};
    }).sort((a,b)=>a.category.localeCompare(b.category)||a.name.localeCompare(b.name));
  },[plan,getR]);

  const dailyKcals=useMemo(()=>{const t=[];for(let d=0;d<5;d++){t.push(getR(plan.breakfasts[d]).kcal+getR(plan.dinners[d]).kcal+getR(plan.dinners[d+1]).kcal);}return t;},[plan,getR]);
  const weeklyAvg=useMemo(()=>Math.round(dailyKcals.reduce((a,b)=>a+b,0)/5),[dailyKcals]);

  const budgetBk=filteredRecipes.filter(r=>r.type==="breakfast").length;
  const budgetMn=filteredRecipes.filter(r=>r.type==="main").length;

  const activeRulesCount=allRules.filter(r=>r.enabled).length;
  return (
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <div style={{maxWidth:"1280px",margin:"0 auto",padding:"24px 32px 80px"}}>

        {/* Top bar */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"32px",flexWrap:"wrap",gap:"12px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <div style={{width:"30px",height:"30px",borderRadius:"8px",background:"var(--ink)",color:"var(--bg)",display:"grid",placeItems:"center",fontFamily:"'Instrument Serif',serif",fontSize:"20px",fontStyle:"italic"}}>P</div>
            <div style={{fontWeight:600,letterSpacing:"-0.01em",fontSize:"15px"}}>Perekonna Toiduplaan</div>
          </div>
          <div style={{display:"flex",gap:"2px"}}>
            {[{k:"edit",l:"Plaan"},{k:"menu",l:"Nädala tabel"},{k:"shop",l:"Ostunimekiri"},{k:"saved",l:`Ajalugu (${savedMenus.length})`},{k:"rules",l:"Seaded"}].map(t=>(
              <button key={t.k} onClick={()=>setView(t.k)} style={{padding:"8px 14px",color:view===t.k?"var(--ink)":"var(--muted)",background:view===t.k?"rgba(0,0,0,.05)":"transparent",border:"none",borderRadius:"999px",fontSize:"14px",fontWeight:500,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{t.l}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
            <a href="https://docs.google.com/spreadsheets/d/1hqy0t9n7RSujtkBDMnraGB-9s0iRAHbt/edit" target="_blank" rel="noopener noreferrer" className="pp-chip" style={{textDecoration:"none"}}>
              <ExternalLink className="w-3.5 h-3.5" style={{color:"var(--muted)"}}/> Sheet
            </a>
            <a href="https://drive.google.com/drive/folders/1iuVk8H3Z6pY3RPWWbO8b2PX3t88OrpiK?usp=sharing" target="_blank" rel="noopener noreferrer" className="pp-chip" style={{textDecoration:"none"}} title="Liisbethi Insta retseptide kaust">
              <ExternalLink className="w-3.5 h-3.5" style={{color:"var(--muted)"}}/> Insta retseptid
            </a>
          </div>
        </div>

        {/* Hero */}
        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:"24px",alignItems:"end",marginBottom:"28px"}}>
          <div>
            <div className="pp-eyebrow" style={{marginBottom:"12px"}}>{DAYS_ET[0]} – {DAYS_ET[4]} · {dateRange}</div>
            <h1 className="serif" style={{fontSize:"clamp(36px,5vw,58px)",lineHeight:1.05,letterSpacing:"0.025em",margin:0}}>Nädala <em style={{fontStyle:"italic",color:"var(--accent)"}}>menüü</em></h1>
            <div style={{display:"flex",gap:"22px",color:"var(--muted)",fontSize:"14px",marginTop:"14px",flexWrap:"wrap",alignItems:"center"}}>
              {FAMILY.map(m=>(
                <div key={m.name} style={{display:"flex",alignItems:"baseline",gap:"6px"}}>
                  <strong style={{color:"var(--ink)",fontWeight:500}}>{m.name}</strong>
                  <span>·</span>
                  {editingWeight===m.name?(
                    <input
                      type="text"
                      autoFocus
                      value={weightDraft}
                      onChange={e=>setWeightDraft(e.target.value)}
                      onBlur={commitWeight}
                      onKeyDown={e=>{if(e.key==="Enter")commitWeight();if(e.key==="Escape"){setEditingWeight(null);setWeightDraft("");}}}
                      style={{width:"54px",padding:"2px 6px",border:"1px solid var(--line-strong)",borderRadius:"6px",fontSize:"14px",fontFamily:"inherit",background:"var(--surface)",color:"var(--ink)",fontVariantNumeric:"tabular-nums"}}
                    />
                  ):(
                    <button
                      onClick={()=>startEditWeight(m.name)}
                      title="Vajuta, et kaalu uuendada"
                      style={{background:"none",border:"none",padding:"0 2px",borderBottom:"1px dashed var(--line-strong)",cursor:"pointer",color:"var(--ink)",fontWeight:500,fontVariantNumeric:"tabular-nums",fontSize:"14px",fontFamily:"inherit"}}
                    >{weights[m.name]??"–"} kg</button>
                  )}
                  <span>·</span>
                  <span>{m.dailyKcal} kcal</span>
                </div>
              ))}
              <span className="pp-muted" style={{fontSize:"11px",fontStyle:"italic",letterSpacing:".02em"}}>kaal käsitsi · Withings tuleb hiljem</span>
            </div>
          </div>
          <button onClick={generateNewPlan} className="pp-btn pp-btn-dark">
            <Shuffle className="w-4 h-4" /> Genereeri uus plaan
          </button>
        </div>

        {/* Controls strip */}
        <div className="pp-card" style={{padding:"14px 18px",marginBottom:"24px",display:"flex",alignItems:"center",gap:"12px",flexWrap:"wrap"}}>
          <span className="pp-muted" style={{fontSize:"13px",fontWeight:500}}>Eelarve</span>
          <div className="pp-seg">
            <button onClick={()=>setBudgetMode("normal")} className={budgetMode==="normal"?"is-on":""}>Palgapäevale lähedal ({RECIPE_COSTS.length})</button>
            <button onClick={()=>setBudgetMode("budget")} className={budgetMode==="budget"?"is-on":""}>Kokkuhoid ({budgetBk+budgetMn})</button>
          </div>

          <div style={{flex:1,minWidth:"12px"}}></div>

          <button onClick={saveCurrentMenu} className="pp-btn pp-btn-outline" style={{padding:"8px 14px",fontSize:"13px"}}>
            <Save className="w-3.5 h-3.5"/>Salvesta
          </button>
        </div>

        {view==="rules"?<><RulesPanel rules={allRules} onToggle={toggleRule} onAdd={addCustomRule} onRemove={removeCustomRule} /><ExtensionStatusCard/></>
        :view==="menu"?<WeeklyMenuView plan={plan} getR={getR} getCost={getCost} dailyKcals={dailyKcals} weeklyAvg={weeklyAvg} dateRange={dateRange} budgetMode={budgetMode} onSwap={(d,t)=>{setSwapDay(d);setSwapType(t);}} onViewRecipe={setViewRecipe} />
        :view==="saved"?<SavedMenusPanel savedMenus={savedMenus} onLoad={sp=>{loadSavedMenu(sp);setView("edit");}} onDelete={deleteSavedMenu} getR={getR} onImport={importMenus} onExport={exportMenus} />
        :view==="shop"?<ShoppingListPanel items={shoppingList} />
        :<>
          {/* Week grid */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,minmax(220px,1fr))",gap:"14px",marginBottom:"32px"}} className="pp-week-grid">
            {DAYS_ET.map((day,di)=>{
              const isToday=di===0;
              return (
                <div key={day} className={`pp-card ${isToday?"pp-day-today":""}`} style={{padding:"18px",display:"flex",flexDirection:"column",gap:"14px"}}>
                  <div style={{paddingBottom:"14px"}} className="pp-divider">
                    <div className={`pp-day-name ${isToday?"today":""}`}>{day}</div>
                    <div className="pp-day-date">{(()=>{const d=new Date(nextMonday);d.setDate(nextMonday.getDate()+di);return `${d.getDate()}. ${["jaan","veebr","märts","apr","mai","juuni","juuli","aug","sept","okt","nov","dets"][d.getMonth()]}`;})()}</div>
                  </div>

                  <MealCard recipe={getR(plan.breakfasts[di])} mealType="breakfast" cost={getCost(plan.breakfasts[di])} locked={locked[`breakfast-${di}`]} onLock={()=>toggleLock(`breakfast-${di}`)} onSwap={()=>{setSwapDay(di);setSwapType("breakfast");}} isLeftover={false} onViewRecipe={setViewRecipe} />
                  <MealCard recipe={getR(plan.dinners[di])} mealType="lunch" cost={getCost(plan.dinners[di])} locked={locked[`lunch-${di}`]} onLock={()=>toggleLock(`lunch-${di}`)} onSwap={()=>{setSwapDay(di);setSwapType("lunch");}} isLeftover={true} onViewRecipe={setViewRecipe} />
                  <MealCard recipe={getR(plan.dinners[di+1])} mealType="dinner" cost={getCost(plan.dinners[di+1])} locked={locked[`dinner-${di}`]} onLock={()=>toggleLock(`dinner-${di}`)} onSwap={()=>{setSwapDay(di);setSwapType("dinner");}} isLeftover={false} onViewRecipe={setViewRecipe} />

                  <div style={{marginTop:"auto",paddingTop:"12px",display:"flex",justifyContent:"flex-end"}}>
                    <span className="pp-day-sum"><strong>{dailyKcals[di]}</strong> kcal</span>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Week summary */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"1px",background:"var(--line)",border:"1px solid var(--line)",borderRadius:"14px",overflow:"hidden",marginBottom:"32px"}} className="pp-stats-strip">
            <div style={{background:"var(--surface)",padding:"16px 20px"}}>
              <div className="pp-eyebrow" style={{marginBottom:"4px"}}>Ostunimekiri</div>
              <div style={{fontFamily:"'Inter',sans-serif",fontSize:"22px",fontWeight:600,letterSpacing:"-0.01em",fontVariantNumeric:"tabular-nums"}}>{shoppingList.length} <span className="pp-muted" style={{fontSize:"14px",fontWeight:400}}>toiduainet</span></div>
              <button onClick={()=>setView("shop")} style={{marginTop:"2px",background:"none",border:"none",color:"var(--accent)",fontSize:"12px",cursor:"pointer",padding:0,fontFamily:"inherit",fontWeight:500}}>Vaata nimekirja →</button>
            </div>
            <div style={{background:"var(--surface)",padding:"16px 20px"}}>
              <div className="pp-eyebrow" style={{marginBottom:"4px"}}>Insta retseptid</div>
              <div style={{fontFamily:"'Inter',sans-serif",fontSize:"14px",fontWeight:500,color:"var(--ink-2)",marginTop:"2px"}}>Liisbethi kogutud ideed</div>
              <a href="https://drive.google.com/drive/folders/1iuVk8H3Z6pY3RPWWbO8b2PX3t88OrpiK?usp=sharing" target="_blank" rel="noopener noreferrer" style={{marginTop:"4px",display:"inline-flex",alignItems:"center",gap:"4px",color:"var(--accent)",fontSize:"12px",fontWeight:500,textDecoration:"none"}}>Ava Drive <ExternalLink className="w-3 h-3"/></a>
            </div>
          </div>
        </>}

        {swapDay!==null&&<SwapPanel options={swapOptions} currentRecipeId={swapType==="breakfast"?plan.breakfasts[swapDay]:swapType==="lunch"?plan.dinners[swapDay]:plan.dinners[swapDay+1]} onSelect={swapMeal} onClose={()=>{setSwapDay(null);setSwapType(null);}} mealType={swapType} />}
        {viewRecipe!==null&&<RecipeDetailPanel recipe={getR(viewRecipe)} onClose={()=>setViewRecipe(null)} />}
        {toast&&(
          <div key={toast.id} className={`pp-toast pp-toast-${toast.kind}`}>
            <Check className="w-4 h-4"/>
            <span>{toast.message}</span>
          </div>
        )}
      </div>

      <style>{`
        @media (max-width: 1100px){
          .pp-week-grid{grid-template-columns:repeat(2,1fr)!important}
        }
        @media (max-width: 820px){
          .pp-stats-strip{grid-template-columns:1fr!important}

function generateSteps(recipe,ings){
  const n=recipe.name.toLowerCase();const s=[];const t=recipe.prepTime;
  const h=(re)=>ings.some(i=>re.test(i.name.toLowerCase()));
  const G=h(/riis|tatar|kinoa|bulgur|hirss|pasta|makaron/),B=h(/leib|sepik|kukkel|galett/),M=h(/hakkliha|peekon|sink|kana/);
  const F=h(/lõhe|forell|räim|tuunikala|latikas|vürtsikilu/),T=h(/tofu|tempeh/),E=h(/muna|munavalge/);
  const L=h(/oad|kikerherned|läätsed/),V=h(/paprika|tomat|kurk|suvikõrvits|baklažaan|porgand|sibul|šampinjon|kõrvits|spinat|herned/);
  const D=h(/juust|feta|ricotta|kodujuust|kohupiim|hapukoor|jogurt|kohupiimakreem|kohupiimapasta/);
  const P=h(/banaan|õun|mango|maasika|mustika|vaarika|virsik|apelsin|põldmarja/),O=h(/kaerahelbed/);
  const c=x=>n.includes(x);
  if(c("smuuti")||c("bowl")&&P){s.push("Pese puuviljad/marjad.","Pane blenderisse ja miksi ühtlaseks.");if(c("bowl"))s.push("Vala kaussi, lisa peale seemned ja puuviljatükid.");}
  else if(c("puder")){O?s.push("Keeda kaerahelbed vee/piimaga pudrukonsistentsiks."):G&&s.push("Keeda tangained pakendi juhendi järgi.");E&&s.push("Lisa muna(d) ja sega.");P&&s.push("Koori ja viilutal puuviljad.");D&&s.push("Lisa piimatoode ja sega.");s.push("Serveeri toppingutega.");}
  else if(c("omlett")){s.push("Klopi munad lahti, maitsesta.");V&&s.push("Lõika köögiviljad tükkideks.");s.push("Kuumuta pannil õli, vala munamass.");(M||F)&&s.push("Lisa liha/kala tükid peale.");s.push("Küpseta kuni alt kuldne, pealt tardunud.");B&&s.push("Röstige leib kõrvale.");}
  else if(c("muffin")||c("kook")||c("küpsise")){s.push("Eelkuumuta ahi 180°C.");h(/jahu/)&&s.push("Sega kuivad koostisosad eraldi kausis.");E&&s.push("Klopi munad, sega märjad koostisosad kokku.");s.push("Ühenda kuiv ja märg segu ühtlaseks.");P&&s.push("Lisa puuvilja-/köögiviljatükid taignasse.");s.push("Küpseta ahjus "+Math.max(t-10,15)+" min. Lase jahtuda.");}
  else if(c("vokk")){s.push("Lõika köögiviljad ja tofu ribadeks.");G&&s.push("Keeda riis/tangained eraldi.");s.push("Kuumuta wokipannil õli kõrgel kuumusel.");T&&s.push("Prae tofu kuldpruuniks, eemalda.");s.push("Prae köögiviljad 3-5 min.","Sega kõik kokku ja serveeri.");}
  else if(c("pasta")||c("bolognese")){s.push("Keeda pasta soolases vees al dente.");M&&s.push("Prae hakkliha pruuniks.");T&&s.push("Purusta tofu ja prae 5 min.");V&&s.push("Lõika köögiviljad, prae 3-4 min.");h(/koor|köögikoor/)&&s.push("Lisa koor ja lase keema.");s.push("Sega pasta kastmega kokku.");}
  else if(c("salat")){s.push("Pese ja lõika köögiviljad tükkideks.");G&&s.push("Keeda tangained, lase jahtuda.");(M||F)&&s.push("Valmista liha/kala ette.");E&&s.push("Keeda munad kõvaks (10 min), lõika.");D&&s.push("Murene juust peale.");s.push("Sega kokku ja maitsesta.");}
  else if(c("pihv")){s.push("Purusta põhikoostisosa, sega siduvate ainetega.","Vormi pihvid.","Prae pannil mõlemalt poolt kuldpruuniks ~4 min.");V&&s.push("Valmista kõrvale salat.");}
  else if(c("pada")||c("roog")){M&&s.push("Prae liha potis pruuniks.");s.push("Lisa sibul ja küüslauk, prae 2 min.");V&&s.push("Lisa köögiviljad, prae 5 min.");L&&s.push("Lisa oad/kikerherned ja tomatikaste.");G&&s.push("Lisa tangained ja vesi.");s.push("Hauta madalal kuumusel "+Math.max(t-10,10)+" min.");}
  else if(c("röst")||B&&(c("praetud")||c("vaagen"))){s.push("Röstige leib kuldpruuniks.");E&&s.push("Prae/keeda munad.");s.push("Sea toppingud leivale.");D&&s.push("Lisa kodujuust/hapukoor.");}
  else if(c("praetud")){s.push("Valmista koostisosad ette.","Kuumuta pannil õli.","Prae põhikoostisosa kuldpruuniks.");D&&s.push("Lisa kreemja koostisosa.");s.push("Serveeri soojalt.");}
  else if(c("kreem")){D&&s.push("Vahusta koor/kreemja osa ühtlaseks.");P&&s.push("Lõika puuviljad/marjad.");s.push("Kihi kreemja osa ja puuviljad kausis.","Serveeri jahedalt.");}
  else if(c("pasteet")){s.push("Nõruta konservoad.","Miksi blenderis siledaks.");B&&s.push("Röstige leib.");s.push("Määri leivale ja lisa toppingud.");}
  else if(c("täidetud")){s.push("Eelkuumuta ahi 200°C.","Lõika köögivili pooleks, õõnesta.","Sega täidis kokku.","Täida ja küpseta ahjus "+Math.max(t-5,15)+" min.");}
  else{G&&s.push("Keeda tangained pakendi juhendi järgi.");M&&s.push("Prae liha pruuniks.");F&&!h(/külmsuitsu|konserv/)&&s.push("Prae kala mõlemalt poolt ~4 min.");T&&s.push("Prae tofu kuldpruuniks.");E&&s.push("Prae/keeda munad.");V&&s.push("Lõika ja valmista köögiviljad.");L&&s.push("Nõruta ja kuumuta oad/kikerherned.");B&&s.push("Röstige leib.");D&&s.push("Lisa piimatooted.");P&&s.push("Lõika puuviljad.");if(!s.length)s.push("Valmista koostisosad ette ja sega kokku.");s.push("Serveeri ja naudi!");}
  return s;
}

function parseRecipeIngredients(str){
  const parts=str.split(", ");const result=[];let current=null;
  for(const part of parts){
    const m=part.match(/^(\d+(?:\.\d+)?)(.*?)\s+(.+)$/);
    if(m){if(current)result.push(current);const qty=parseFloat(m[1]);const rawUnit=m[2].trim();const name=m[3].trim();const unit=UNIT_MAP[rawUnit]||rawUnit;current={name,qty,unit};}
    else if(current){current.name+=", "+part;}
    else{current={name:part,qty:0,unit:""};}
  }
  if(current)result.push(current);
  return result.map(ing=>{
    const isEgg=EGG_KEYWORDS.some(kw=>ing.name.toLowerCase().includes(kw));
    if(isEgg)return{name:ing.name,qty:Math.round(ing.qty/EGG_WEIGHT),unit:"tk"};
    if(ing.unit==="g"&&ing.qty>=1000)return{name:ing.name,qty:Math.round((ing.qty/1000)*100)/100,unit:"kg"};
    return{name:ing.name,qty:Math.round(ing.qty*10)/10,unit:ing.unit};
  });
}

// Prisma Market helpers. The meal planner can talk to a Chrome extension that
// lives at /prisma-extension/ — when installed, it drives prismamarket.ee
// using the user's own logged-in session. Without the extension, we fall back
// to opening search tabs for each item.
const PRISMA_SEARCH="https://www.prismamarket.ee/tooted?queryString=";
function normalizeForSearch(name){return name.split(/[,(]/)[0].trim().toLowerCase();}
function prismaUrl(name,organic){const q=normalizeForSearch(name)+(organic?" mahe":"");return PRISMA_SEARCH+encodeURIComponent(q);}

function PrismaAssistant({items,checked,onToggle,onClose,preferOrganic,setPreferOrganic}){
  const [extReady,setExtReady]=useState(false);
  const [progress,setProgress]=useState({running:false,done:0,failed:0,queued:0,lastMessage:""});
  useEffect(()=>{
    const handler=(e)=>{
      if(e.source!==window) return;
      const d=e.data;
      if(!d||d.source!=="pp-ext") return;
      if(d.type==="READY"||d.type==="PONG"){setExtReady(true);}
      else if(d.type==="GONE"){setExtReady(false);}
      else if(d.type==="STATUS"){setProgress({running:!!d.running,queued:d.queued||0,done:d.stats?.done||0,failed:d.stats?.failed||0,lastMessage:d.stats?.lastMessage||""});}
      else if(d.type==="ITEM_DONE"){if(d.ok&&d.item?.name){onToggle(d.item.name);}}
      else if(d.type==="DONE"){setProgress(p=>({...p,running:false,lastMessage:d.stats?.lastMessage||"Valmis."}));}
    };
    window.addEventListener("message",handler);
    try{window.postMessage({source:"pp-planner",type:"PING"},"*");}catch{}
    return()=>window.removeEventListener("message",handler);
  },[onToggle]);
  const sendToExtension=()=>{
    const payload=items.map(i=>({name:normalizeForSearch(i.name),organic:preferOrganic}));
    window.postMessage({source:"pp-planner",type:"ADD_ITEMS",items:payload,preferOrganic},"*");
  };
  const stopExtension=()=>{
    window.postMessage({source:"pp-planner",type:"STOP"},"*");
  };
  const openAll=()=>{const batch=items.slice(0,20);batch.forEach(item=>window.open(prismaUrl(item.name,preferOrganic),"_blank","noopener,noreferrer"));};
  return(
    <div className="pp-overlay" onClick={onClose}>
      <div className="pp-modal" onClick={e=>e.stopPropagation()} style={{maxWidth:"720px"}}>
        <div className="pp-modal-head">
          <div>
            <div className="pp-eyebrow">Ostukorv</div>
            <h3 className="pp-modal-title" style={{marginTop:"2px"}}>Telli Prismast</h3>
          </div>
          <button onClick={onClose} className="pp-icon-btn" style={{width:"34px",height:"34px"}}><X_ className="w-4 h-4"/></button>
        </div>
        <div className="pp-modal-body pp-scroll">
          <div style={{background:extReady?"var(--accent-soft)":"var(--surface-2)",borderRadius:"12px",padding:"14px 16px",marginBottom:"14px",fontSize:"13px",color:"var(--ink-2)",lineHeight:1.5,border:extReady?"none":"1px dashed var(--line-strong)"}}>
            {extReady?(<><strong style={{color:"var(--ink)"}}>Chrome laiendus leitud.</strong> Klõpsa <em>Lisa otse ostukorvi</em>. Avaneb üks Prisma sakk, kus laiendus otsib iga toodet sinu sisselogitud kontoga ja lisab esimese sobiva tulemuse korvi. Saad protsessi <em>Peata</em> nupuga igal ajal lõpetada.</>):(<><strong style={{color:"var(--ink)"}}>Chrome laiendus puudu.</strong> Paigalda <code style={{background:"var(--surface)",padding:"1px 5px",borderRadius:"4px",fontSize:"12px"}}>prisma-extension/</code> kaust (juhis README-s) ja laadi see leht uuesti. Seniks saad kasutada <em>Ava sakkidesse</em> varianti allpool.</>)}
          </div>
          {progress.running&&(
            <div style={{background:"var(--surface-2)",border:"1px solid var(--line)",borderRadius:"10px",padding:"12px 14px",marginBottom:"14px",fontSize:"12px",color:"var(--ink-2)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                <span style={{fontWeight:600,color:"var(--ink)"}}>Töös</span>
                <span className="pp-tabular">{progress.done} lisatud · {progress.failed} vahele · {progress.queued} järjekorras</span>
              </div>
              <div style={{marginTop:"6px",fontStyle:"italic"}}>{progress.lastMessage}</div>
            </div>
          )}
          <div style={{display:"flex",gap:"10px",alignItems:"center",marginBottom:"18px",flexWrap:"wrap"}}>
            {progress.running?(
              <button onClick={stopExtension} className="pp-btn" style={{padding:"9px 14px",fontSize:"13px",background:"#a23a2a",color:"#fff",border:"1px solid #a23a2a"}}><X_ className="w-3.5 h-3.5"/>Peata</button>
            ):(
              <button onClick={sendToExtension} className="pp-btn pp-btn-dark" style={{padding:"9px 14px",fontSize:"13px"}} disabled={!extReady||items.length===0}><ShoppingCart className="w-3.5 h-3.5"/>Lisa otse ostukorvi · {items.length}</button>
            )}
            <button onClick={openAll} className="pp-btn pp-btn-outline" style={{padding:"9px 14px",fontSize:"13px"}} disabled={items.length===0||progress.running}>Ava sakkidesse ({Math.min(items.length,20)})</button>
            <label style={{display:"inline-flex",alignItems:"center",gap:"8px",cursor:"pointer",fontSize:"13px",color:"var(--ink-2)",marginLeft:"auto"}}>
              <div onClick={()=>setPreferOrganic(v=>!v)} className={`pp-switch ${preferOrganic?"on":""}`}/>
              Eelista mahe tooteid
            </label>
          </div>
          {items.length===0?(
            <p className="pp-muted" style={{fontStyle:"italic",fontSize:"14px",textAlign:"center",padding:"30px 0"}}>Kõik on juba ostetud.</p>
          ):(
            <div style={{display:"flex",flexDirection:"column"}}>
              {items.map((item,idx)=>(
                <div key={item.name} style={{display:"flex",alignItems:"center",gap:"12px",padding:"10px 4px",borderBottom:idx<items.length-1?"1px dashed var(--line)":"none"}}>
                  <div onClick={()=>onToggle(item.name)} title="Märgi ostetuks" style={{width:"20px",height:"20px",borderRadius:"4px",border:"1px solid var(--line-strong)",background:"transparent",display:"grid",placeItems:"center",flexShrink:0,cursor:"pointer",transition:"all .15s"}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:"var(--ink)",fontSize:"14px",fontWeight:500}}>{item.name}</div>
                    <div className="pp-muted" style={{fontSize:"11px",marginTop:"2px"}}>{typeof item.quantity==="number"?item.unit==="tk"?item.quantity:item.quantity.toFixed(1):item.quantity} {item.unit}</div>
                  </div>
                  <a href={prismaUrl(item.name,preferOrganic)} target="_blank" rel="noopener noreferrer" className="pp-btn pp-btn-outline" style={{padding:"6px 12px",fontSize:"12px"}}>Otsi Prismas<ExternalLink className="w-3 h-3"/></a>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

              {g.items.map((item,idx)=>{const done=!!checked[item.name];const isExtra=item.meals[0]==="käsitsi";return(
                <div key={item.name} onClick={()=>toggle(item.name)} style={{display:"flex",alignItems:"center",gap:"14px",padding:"10px 4px",borderBottom:idx<g.items.length-1?"1px dashed var(--line)":"none",cursor:"pointer",opacity:done?0.45:1,transition:"opacity .15s"}}>
                  <div style={{width:"18px",height:"18px",borderRadius:"4px",border:"1px solid",borderColor:done?"var(--ink)":"var(--line-strong)",background:done?"var(--ink)":"transparent",display:"grid",placeItems:"center",flexShrink:0,transition:"all .15s"}}>{done&&<Check className="w-3 h-3" style={{color:"var(--bg)"}}/>}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                      <span style={{color:"var(--ink)",fontSize:"14px",fontWeight:500,textDecoration:done?"line-through":"none"}}>{item.name}</span>
                      {isExtra&&<button onClick={e=>{e.stopPropagation();removeExtra(item.name);}} className="pp-icon-btn" style={{width:"20px",height:"20px"}}><X_ className="w-3 h-3"/></button>}
                    </div>
                    <div className="pp-muted" style={{fontSize:"11px",marginTop:"2px"}}>{item.meals.join(" · ")}</div>
                  </div>
                  <a href={prismaUrl(item.name,preferOrganic)} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} className="pp-icon-btn" title="Otsi Prismas" style={{width:"26px",height:"26px",color:"var(--muted)"}}><ExternalLink className="w-3 h-3"/></a>
                  <div className="pp-tabular serif" style={{fontSize:"16px",color:"var(--ink)",whiteSpace:"nowrap"}}>{typeof item.quantity==="number"?item.unit==="tk"?item.quantity:item.quantity.toFixed(1):item.quantity} <span className="pp-muted" style={{fontSize:"12px",fontFamily:"'Inter',sans-serif",fontStyle:"normal"}}>{item.unit}</span></div>
                </div>
              );})}
            </div>
          </div>
        ))}
      </div>
      <div style={{padding:"18px 28px",borderTop:"1px solid var(--line)",background:"var(--surface-2)"}}>
        <div className="pp-eyebrow" style={{marginBottom:"8px"}}>Lisa käsitsi</div>
        <div style={{display:"flex",gap:"8px"}}>
          <input type="text" value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addExtra();}} placeholder="nt: piim, leib, kohv..." className="pp-input" style={{flex:1}} />
          <button onClick={addExtra} className="pp-btn pp-btn-dark" style={{padding:"8px 14px"}}><Plus className="w-4 h-4"/>Lisa</button>
        </div>
      </div>
      <div style={{padding:"14px 28px",borderTop:"1px solid var(--line)",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"8px"}}>
        <span className="pp-muted" style={{fontSize:"12px"}}>{allItems.length} koostisosa · 2 inimese kohta</span>
        {checkedCount>0&&<button onClick={()=>setChecked({})} className="pp-btn pp-btn-ghost" style={{padding:"6px 12px",fontSize:"12px"}}>Tühjenda valikud</button>}
      </div>
      {assistOpen&&<PrismaAssistant items={uncheckedItems} checked={checked} onToggle={toggle} onClose={()=>setAssistOpen(false)} preferOrganic={preferOrganic} setPreferOrganic={setPreferOrganic}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MealPlanner />);
  </script>
</body>
</html>
