function categorize(name){
  const low=name.toLowerCase();
  for(const [cat,keywords] of Object.entries(CATEGORIES)){
    if(keywords.some(kw=>low.includes(kw)))return cat;
  }
  return "Muu";
}

function isSoup(r){return SOUP_KEYWORDS.some(kw=>r.name.toLowerCase().includes(kw));}
function estimateCost(r){const t=(r.name+" "+r.ingredients).toLowerCase();let s=0;EXPENSIVE_KEYWORDS.forEach(kw=>{if(t.includes(kw))s+=2;});CHEAP_KEYWORDS.forEach(kw=>{if(t.includes(kw))s-=1;});return s;}
function getBudgetPhase(mon){const d=mon.getDate();return(d>=PAYDAY&&d<PAYDAY+14)?"normal":"budget";}
const RECIPE_COSTS=RECIPES.map(r=>({...r,cost:estimateCost(r)}));
const BUDGET_THRESHOLD=0;

function getNextMonday(){const today=new Date(2026,2,28);const day=today.getDay();const diff=(1-day+7)%7||7;const m=new Date(today);m.setDate(today.getDate()+diff);return m;}
function formatDateRange(s,e){return `${s.getDate()}.${s.getMonth()+1} - ${e.getDate()}.${e.getMonth()+1}.${e.getFullYear()}`;}
function normalizeUnit(raw){return UNIT_MAP[raw]||raw;}
function formatQuantity(qty,unit){if(unit==="g"&&qty>=1000)return{qty:Math.round((qty/1000)*100)/100,unit:"kg"};if(unit==="ml"&&qty>=1000)return{qty:Math.round((qty/1000)*100)/100,unit:"l"};return{qty:Math.round(qty*10)/10,unit};}
function parseIngredients(str){const ings={};str.split(", ").forEach(part=>{const m=part.match(/^(\d+(?:\.\d+)?)(.*?)\s+(.+)$/);if(m){const qty=parseFloat(m[1]);const unit=normalizeUnit(m[2].trim());const name=m[3].trim();const key=name.toLowerCase();if(!ings[key])ings[key]={name,quantity:0,unit};ings[key].quantity+=qty;}});return ings;}

function MealPlanner(){
  const nextMonday=getNextMonday();
  const budgetPhase=getBudgetPhase(nextMonday);
  const [budgetMode,setBudgetMode]=useState(budgetPhase);
  const [rules,setRules]=useState(DEFAULT_RULES);
  const [customRules,setCustomRules]=useState([]);
  const allRules=useMemo(()=>[...rules,...customRules],[rules,customRules]);
  const isRuleOn=useCallback(id=>allRules.find(r=>r.id===id)?.enabled??false,[allRules]);
  const toggleRule=useCallback(id=>{setRules(p=>p.map(r=>r.id===id?{...r,enabled:!r.enabled}:r));setCustomRules(p=>p.map(r=>r.id===id?{...r,enabled:!r.enabled}:r));},[]);
  const addCustomRule=useCallback((name,desc)=>{setCustomRules(p=>[...p,{id:"custom-"+Date.now(),name,description:desc,enabled:true,builtin:false}]);},[]);
  const removeCustomRule=useCallback(id=>{setCustomRules(p=>p.filter(r=>r.id!==id));},[]);
  const filteredRecipes=useMemo(()=>budgetMode==="normal"?RECIPE_COSTS:RECIPE_COSTS.filter(r=>r.cost<=BUDGET_THRESHOLD),[budgetMode]);

  const [plan,setPlan]=useState({breakfasts:[52,43,64,13,34],dinners:[59,18,16,8,38,39]});
  const nextFriday=new Date(nextMonday);
  nextFriday.setDate(nextMonday.getDate()+4);
  const dateRange=formatDateRange(nextMonday,nextFriday);

  const [locked,setLocked]=useState({});
  const [savedMenus,setSavedMenus]=useState([{id:1,label:"30.3 - 3.4.2026",savedAt:"29.03.2026 12:00",plan:{breakfasts:[52,43,64,13,34],dinners:[59,18,16,8,38,39]}}]);
  const [view,setView]=useState("edit");
  const [swapDay,setSwapDay]=useState(null);
  const [swapType,setSwapType]=useState(null);
  const [viewRecipe,setViewRecipe]=useState(null);

  const pickFromPool=useCallback((pool,used)=>{const av=pool.filter(r=>!used.has(r.id));const src=av.length>0?av:pool;return src[Math.floor(Math.random()*src.length)].id;},[]);

  const generateNewPlan=useCallback(()=>{
    const noDupes=isRuleOn("no-duplicates");
    const dinnerIsCooking=isRuleOn("dinner-is-cooking");
    const minPrep=isRuleOn("min-prep-dinner");
    const noSoups=isRuleOn("no-soups");
    let bkPool=filteredRecipes.filter(r=>r.type==="breakfast"||r.type==="snack");
    let dnPool=filteredRecipes.filter(r=>r.type==="main");
    if(noSoups){bkPool=bkPool.filter(r=>!isSoup(r));dnPool=dnPool.filter(r=>!isSoup(r));}
    if(minPrep){const f=dnPool.filter(r=>r.prepTime>=15);if(f.length>=6)dnPool=f;}
    setPlan(prev=>{
      const used=new Set();
      const newD=[];
      for(let i=0;i<6;i++){if(prev.dinners[i]!==undefined&&locked[`dinner-${i}`]){newD.push(prev.dinners[i]);if(noDupes)used.add(prev.dinners[i]);}else{const p=pickFromPool(dnPool,noDupes?used:new Set());newD.push(p);if(noDupes)used.add(p);}}
      const newB=[];
      for(let i=0;i<5;i++){if(prev.breakfasts[i]!==undefined&&locked[`breakfast-${i}`]){newB.push(prev.breakfasts[i]);if(noDupes)used.add(prev.breakfasts[i]);}else{const p=pickFromPool(bkPool,noDupes?used:new Set());newB.push(p);if(noDupes)used.add(p);}}
      return{breakfasts:newB,dinners:newD};
    });
  },[locked,filteredRecipes,isRuleOn,pickFromPool]);

  const getR=useCallback(id=>RECIPES.find(r=>r.id===id),[]);
  const getCost=useCallback(id=>RECIPE_COSTS.find(r=>r.id===id)?.cost??0,[]);
  const toggleLock=useCallback(key=>setLocked(p=>({...p,[key]:!p[key]})),[]);

  const saveCurrentMenu=useCallback(()=>{
    const now=new Date();
    setSavedMenus(p=>[{id:Date.now(),label:dateRange,savedAt:now.toLocaleDateString("et-EE")+" "+now.toLocaleTimeString("et-EE",{hour:"2-digit",minute:"2-digit"}),plan:{breakfasts:[...plan.breakfasts],dinners:[...plan.dinners]}},...p]);
  },[plan,dateRange]);
  const loadSavedMenu=useCallback(sp=>{setPlan({breakfasts:[...sp.breakfasts],dinners:[...sp.dinners]});},[]);
  const deleteSavedMenu=useCallback(id=>{setSavedMenus(p=>p.filter(m=>m.id!==id));},[]);
  const importMenus=useCallback(json=>{try{const data=JSON.parse(json);if(Array.isArray(data)){setSavedMenus(data);return true;}return false;}catch{return false;}},[]);
  const exportMenus=useCallback(()=>JSON.stringify(savedMenus),[savedMenus]);

  const swapMeal=useCallback(newId=>{
    if(swapType==="breakfast")setPlan(p=>({...p,breakfasts:p.breakfasts.map((id,i)=>i===swapDay?newId:id)}));
    else if(swapType==="lunch")setPlan(p=>({...p,dinners:p.dinners.map((id,i)=>i===swapDay?newId:id)}));
    else if(swapType==="dinner")setPlan(p=>({...p,dinners:p.dinners.map((id,i)=>i===swapDay+1?newId:id)}));
    setSwapDay(null);setSwapType(null);
  },[swapDay,swapType]);

  const swapOptions=useMemo(()=>swapType==="breakfast"?RECIPES.filter(r=>r.type==="breakfast"||r.type==="snack"):RECIPES.filter(r=>r.type==="main"),[swapType]);

  const shoppingList=useMemo(()=>{
    const all={};const NUM_PEOPLE=2;const DL=["E","T","K","N","R"];
    const add=(recipe,mc,tag)=>{const ings=parseIngredients(recipe.ingredients);Object.entries(ings).forEach(([k,ing])=>{const sq=ing.quantity*mc*NUM_PEOPLE;if(!all[k]){all[k]={name:ing.name,quantity:sq,unit:ing.unit,meals:[]};}else{all[k].quantity+=sq;}if(!all[k].meals.includes(tag))all[k].meals.push(tag);});};
    plan.breakfasts.forEach((id,i)=>add(getR(id),1,DL[i]+" hommik"));
    plan.dinners.forEach((id,idx)=>{
      if(idx===0){add(getR(id),1,DL[0]+" lõuna");}
      else if(idx===plan.dinners.length-1){add(getR(id),1,DL[idx-1]+" õhtu");}
      else{add(getR(id),1,DL[idx-1]+" õhtu");add(getR(id),1,DL[idx]+" lõuna");}
    });
    return Object.values(all).map(ing=>{
      const isEgg=EGG_KEYWORDS.some(kw=>ing.name.toLowerCase().includes(kw));
      const f=isEgg?{qty:Math.round(ing.quantity/EGG_WEIGHT),unit:"tk"}:formatQuantity(ing.quantity,ing.unit);
      return{name:ing.name,quantity:f.qty,unit:f.unit,meals:ing.meals,category:categorize(ing.name)};
    }).sort((a,b)=>a.category.localeCompare(b.category)||a.name.localeCompare(b.name));
  },[plan,getR]);

  const dailyKcals=useMemo(()=>{const t=[];for(let d=0;d<5;d++){t.push(getR(plan.breakfasts[d]).kcal+getR(plan.dinners[d]).kcal+getR(plan.dinners[d+1]).kcal);}return t;},[plan,getR]);
  const weeklyAvg=useMemo(()=>Math.round(dailyKcals.reduce((a,b)=>a+b,0)/5),[dailyKcals]);

  const budgetBk=filteredRecipes.filter(r=>r.type==="breakfast").length;
  const budgetMn=filteredRecipes.filter(r=>r.type==="main").length;

  return (
    <div className="min-h-screen bg-gradient-to-br from-teal-50 to-green-50 p-4 md:p-8">
      <div className="max-w-7xl mx-auto">
        <div className="mb-8">
          <div className="flex items-center justify-between mb-2">
            <h1 className="text-4xl md:text-5xl font-bold text-teal-900 flex items-center gap-3">

            <a href="https://docs.google.com/spreadsheets/d/1hqy0t9n7RSujtkBDMnraGB-9s0iRAHbt/edit" target="_blank" rel="noopener noreferrer" className="text-teal-600 hover:text-teal-700 transition"><ExternalLink className="w-5 h-5" /></a>
          </div>
          <p className="text-teal-700 text-lg font-medium">{DAYS_ET[0]} - {DAYS_ET[4]} | {dateRange}</p>
        </div>

        <div className="bg-white rounded-xl shadow-md p-6 mb-6">
          <div className="flex items-center gap-6">
            <Users className="w-6 h-6 text-teal-600" />
            <div className="flex gap-8 flex-wrap">
              {FAMILY.map(m=><div key={m.name} className="flex flex-col"><p className="font-semibold text-gray-900">{m.name}</p><p className="text-sm text-gray-600">{m.dailyKcal} kcal/päev</p></div>)}
            </div>
          </div>
        </div>

        <div className="bg-white rounded-xl shadow-md p-4 mb-6">
          <div className="flex items-center justify-between flex-wrap gap-3">
            <div className="flex items-center gap-3">
              <span className="text-sm font-semibold text-gray-700">Eelarve:</span>
              <button onClick={()=>setBudgetMode("normal")} className={`px-4 py-2 rounded-lg text-sm font-semibold transition ${budgetMode==="normal"?"bg-green-600 text-white shadow":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>Palgap. 1-2 n. ({RECIPE_COSTS.length})</button>
              <button onClick={()=>setBudgetMode("budget")} className={`px-4 py-2 rounded-lg text-sm font-semibold transition ${budgetMode==="budget"?"bg-amber-500 text-white shadow":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>Kokkuhoid 3-4 n. ({budgetBk+budgetMn})</button>
            </div>
          </div>
        </div>

        <div className="flex gap-3 mb-6 flex-wrap">
          <button onClick={generateNewPlan} className={`flex items-center gap-2 px-6 py-3 font-semibold rounded-lg transition shadow-md hover:shadow-lg text-white ${budgetMode==="budget"?"bg-amber-500 hover:bg-amber-600":"bg-green-600 hover:bg-green-700"}`}><Shuffle className="w-5 h-5" />Genereeri menüü</button>
          <button onClick={()=>setView(view==="menu"?"edit":"menu")} className={`flex items-center gap-2 px-6 py-3 font-semibold rounded-lg transition shadow-md hover:shadow-lg ${view==="menu"?"bg-teal-700 text-white":"bg-teal-600 hover:bg-teal-700 text-white"}`}><Calendar className="w-5 h-5" />{view==="menu"?"Tagasi":"Nädala menüü"}</button>
          <button onClick={()=>setView(view==="shop"?"edit":"shop")} className={`flex items-center gap-2 px-6 py-3 font-semibold rounded-lg transition shadow-md hover:shadow-lg ${view==="shop"?"bg-purple-700 text-white":"bg-purple-600 hover:bg-purple-700 text-white"}`}><ShoppingCart className="w-5 h-5" />Ostunimekiri</button>
          <button onClick={()=>setView(view==="rules"?"edit":"rules")} className={`flex items-center gap-2 px-6 py-3 font-semibold rounded-lg transition shadow-md hover:shadow-lg ${view==="rules"?"bg-gray-700 text-white":"bg-gray-600 hover:bg-gray-700 text-white"}`}><SlidersHorizontal className="w-5 h-5" />Reeglid ({allRules.filter(r=>r.enabled).length})</button>
          <button onClick={saveCurrentMenu} className="flex items-center gap-2 px-6 py-3 font-semibold rounded-lg transition shadow-md hover:shadow-lg bg-emerald-600 hover:bg-emerald-700 text-white"><Save className="w-5 h-5" />Salvesta</button>
          <button onClick={()=>setView(view==="saved"?"edit":"saved")} className={`flex items-center gap-2 px-6 py-3 font-semibold rounded-lg transition shadow-md hover:shadow-lg ${view==="saved"?"bg-indigo-700 text-white":"bg-indigo-600 hover:bg-indigo-700 text-white"}`}><BookOpen className="w-5 h-5" />Salvestatud ({savedMenus.length})</button>
          <div className="bg-blue-100 text-blue-900 px-4 py-3 rounded-lg font-semibold">{RECIPES.length} retsepti</div>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
            {DAYS_ET.map((day,di)=>(

                <div className="bg-teal-600 text-white px-4 py-3 font-bold text-center">{day}</div>
                <div className="p-4 space-y-3">
                  <MealCard recipe={getR(plan.breakfasts[di])} mealType="breakfast" cost={getCost(plan.breakfasts[di])} locked={locked[`breakfast-${di}`]} onLock={()=>toggleLock(`breakfast-${di}`)} onSwap={()=>{setSwapDay(di);setSwapType("breakfast");}} isLeftover={false} onViewRecipe={setViewRecipe} />
                  <MealCard recipe={getR(plan.dinners[di])} mealType="lunch" cost={getCost(plan.dinners[di])} locked={locked[`lunch-${di}`]} onLock={()=>toggleLock(`lunch-${di}`)} onSwap={()=>{setSwapDay(di);setSwapType("lunch");}} isLeftover={true} onViewRecipe={setViewRecipe} />
                  <MealCard recipe={getR(plan.dinners[di+1])} mealType="dinner" cost={getCost(plan.dinners[di+1])} locked={locked[`dinner-${di}`]} onLock={()=>toggleLock(`dinner-${di}`)} onSwap={()=>{setSwapDay(di);setSwapType("dinner");}} isLeftover={false} onViewRecipe={setViewRecipe} />

                </div>
              </div>
            ))}

          <div className="bg-teal-50 border-2 border-teal-200 rounded-xl p-6 text-center">

            <p className="text-4xl font-bold text-teal-700">{weeklyAvg} kcal</p>
          </div>
        </>}

        {swapDay!==null&&<SwapPanel options={swapOptions} currentRecipeId={swapType==="breakfast"?plan.breakfasts[swapDay]:swapType==="lunch"?plan.dinners[swapDay]:plan.dinners[swapDay+1]} onSelect={swapMeal} onClose={()=>{setSwapDay(null);setSwapType(null);}} mealType={swapType} />}
        {viewRecipe!==null&&<RecipeDetailPanel recipe={getR(viewRecipe)} onClose={()=>setViewRecipe(null)} />}
      </div>
    </div>
  );
}

  const bg=mealType==="breakfast"?"bg-amber-50 border-amber-200":mealType==="lunch"?"bg-blue-50 border-blue-200":"bg-orange-50 border-orange-200";
  const tc=mealType==="breakfast"?"text-amber-900":mealType==="lunch"?"text-blue-900":"text-orange-900";

    <div className={`border-2 rounded-lg p-3 ${bg}`}>

}

function generateSteps(recipe,ings){
  const n=recipe.name.toLowerCase();const s=[];const t=recipe.prepTime;
  const h=(re)=>ings.some(i=>re.test(i.name.toLowerCase()));
  const G=h(/riis|tatar|kinoa|bulgur|hirss|pasta|makaron/),B=h(/leib|sepik|kukkel|galett/),M=h(/hakkliha|peekon|sink|kana/);
  const F=h(/lõhe|forell|räim|tuunikala|latikas|vürtsikilu/),T=h(/tofu|tempeh/),E=h(/muna|munavalge/);
  const L=h(/oad|kikerherned|läätsed/),V=h(/paprika|tomat|kurk|suvikõrvits|baklažaan|porgand|sibul|šampinjon|kõrvits|spinat|herned/);
  const D=h(/juust|feta|ricotta|kodujuust|kohupiim|hapukoor|jogurt|kohupiimakreem|kohupiimapasta/);
  const P=h(/banaan|õun|mango|maasika|mustika|vaarika|virsik|apelsin|põldmarja/),O=h(/kaerahelbed/);
  const c=x=>n.includes(x);
  if(c("smuuti")||c("bowl")&&P){s.push("Pese puuviljad/marjad.","Pane blenderisse ja miksi ühtlaseks.");if(c("bowl"))s.push("Vala kaussi, lisa peale seemned ja puuviljatükid.");}
  else if(c("puder")){O?s.push("Keeda kaerahelbed vee/piimaga pudrukonsistentsiks."):G&&s.push("Keeda tangained pakendi juhendi järgi.");E&&s.push("Lisa muna(d) ja sega.");P&&s.push("Koori ja viilutal puuviljad.");D&&s.push("Lisa piimatoode ja sega.");s.push("Serveeri toppingutega.");}
  else if(c("omlett")){s.push("Klopi munad lahti, maitsesta.");V&&s.push("Lõika köögiviljad tükkideks.");s.push("Kuumuta pannil õli, vala munamass.");(M||F)&&s.push("Lisa liha/kala tükid peale.");s.push("Küpseta kuni alt kuldne, pealt tardunud.");B&&s.push("Röstige leib kõrvale.");}
  else if(c("muffin")||c("kook")||c("küpsise")){s.push("Eelkuumuta ahi 180°C.");h(/jahu/)&&s.push("Sega kuivad koostisosad eraldi kausis.");E&&s.push("Klopi munad, sega märjad koostisosad kokku.");s.push("Ühenda kuiv ja märg segu ühtlaseks.");P&&s.push("Lisa puuvilja-/köögiviljatükid taignasse.");s.push("Küpseta ahjus "+Math.max(t-10,15)+" min. Lase jahtuda.");}
  else if(c("vokk")){s.push("Lõika köögiviljad ja tofu ribadeks.");G&&s.push("Keeda riis/tangained eraldi.");s.push("Kuumuta wokipannil õli kõrgel kuumusel.");T&&s.push("Prae tofu kuldpruuniks, eemalda.");s.push("Prae köögiviljad 3-5 min.","Sega kõik kokku ja serveeri.");}
  else if(c("pasta")||c("bolognese")){s.push("Keeda pasta soolases vees al dente.");M&&s.push("Prae hakkliha pruuniks.");T&&s.push("Purusta tofu ja prae 5 min.");V&&s.push("Lõika köögiviljad, prae 3-4 min.");h(/koor|köögikoor/)&&s.push("Lisa koor ja lase keema.");s.push("Sega pasta kastmega kokku.");}
  else if(c("salat")){s.push("Pese ja lõika köögiviljad tükkideks.");G&&s.push("Keeda tangained, lase jahtuda.");(M||F)&&s.push("Valmista liha/kala ette.");E&&s.push("Keeda munad kõvaks (10 min), lõika.");D&&s.push("Murene juust peale.");s.push("Sega kokku ja maitsesta.");}
  else if(c("pihv")){s.push("Purusta põhikoostisosa, sega siduvate ainetega.","Vormi pihvid.","Prae pannil mõlemalt poolt kuldpruuniks ~4 min.");V&&s.push("Valmista kõrvale salat.");}
  else if(c("pada")||c("roog")){M&&s.push("Prae liha potis pruuniks.");s.push("Lisa sibul ja küüslauk, prae 2 min.");V&&s.push("Lisa köögiviljad, prae 5 min.");L&&s.push("Lisa oad/kikerherned ja tomatikaste.");G&&s.push("Lisa tangained ja vesi.");s.push("Hauta madalal kuumusel "+Math.max(t-10,10)+" min.");}
  else if(c("röst")||B&&(c("praetud")||c("vaagen"))){s.push("Röstige leib kuldpruuniks.");E&&s.push("Prae/keeda munad.");s.push("Sea toppingud leivale.");D&&s.push("Lisa kodujuust/hapukoor.");}
  else if(c("praetud")){s.push("Valmista koostisosad ette.","Kuumuta pannil õli.","Prae põhikoostisosa kuldpruuniks.");D&&s.push("Lisa kreemja koostisosa.");s.push("Serveeri soojalt.");}
  else if(c("kreem")){D&&s.push("Vahusta koor/kreemja osa ühtlaseks.");P&&s.push("Lõika puuviljad/marjad.");s.push("Kihi kreemja osa ja puuviljad kausis.","Serveeri jahedalt.");}
  else if(c("pasteet")){s.push("Nõruta konservoad.","Miksi blenderis siledaks.");B&&s.push("Röstige leib.");s.push("Määri leivale ja lisa toppingud.");}
  else if(c("täidetud")){s.push("Eelkuumuta ahi 200°C.","Lõika köögivili pooleks, õõnesta.","Sega täidis kokku.","Täida ja küpseta ahjus "+Math.max(t-5,15)+" min.");}
  else{G&&s.push("Keeda tangained pakendi juhendi järgi.");M&&s.push("Prae liha pruuniks.");F&&!h(/külmsuitsu|konserv/)&&s.push("Prae kala mõlemalt poolt ~4 min.");T&&s.push("Prae tofu kuldpruuniks.");E&&s.push("Prae/keeda munad.");V&&s.push("Lõika ja valmista köögiviljad.");L&&s.push("Nõruta ja kuumuta oad/kikerherned.");B&&s.push("Röstige leib.");D&&s.push("Lisa piimatooted.");P&&s.push("Lõika puuviljad.");if(!s.length)s.push("Valmista koostisosad ette ja sega kokku.");s.push("Serveeri ja naudi!");}
  return s;
}

function parseRecipeIngredients(str){
  const parts=str.split(", ");const result=[];let current=null;
  for(const part of parts){
    const m=part.match(/^(\d+(?:\.\d+)?)(.*?)\s+(.+)$/);
    if(m){if(current)result.push(current);const qty=parseFloat(m[1]);const rawUnit=m[2].trim();const name=m[3].trim();const unit=UNIT_MAP[rawUnit]||rawUnit;current={name,qty,unit};}
    else if(current){current.name+=", "+part;}
    else{current={name:part,qty:0,unit:""};}
  }
  if(current)result.push(current);
  return result.map(ing=>{
    const isEgg=EGG_KEYWORDS.some(kw=>ing.name.toLowerCase().includes(kw));
    if(isEgg)return{name:ing.name,qty:Math.round(ing.qty/EGG_WEIGHT),unit:"tk"};
    if(ing.unit==="g"&&ing.qty>=1000)return{name:ing.name,qty:Math.round((ing.qty/1000)*100)/100,unit:"kg"};
    return{name:ing.name,qty:Math.round(ing.qty*10)/10,unit:ing.unit};
  });
}

function RecipeDetailPanel({recipe,onClose}){
  const ings=parseRecipeIngredients(recipe.ingredients);
  const steps=useMemo(()=>generateSteps(recipe,ings),[recipe,ings]);
  const [eaters,setEaters]=useState({liisbeth:true,evert:true});
  const toggleEater=name=>setEaters(p=>({...p,[name]:!p[name]}));
  const multiplier=useMemo(()=>{
    let m=0;
    if(eaters.liisbeth)m+=FAMILY.find(f=>f.name==="Liisbeth").multiplier;
    if(eaters.evert)m+=FAMILY.find(f=>f.name==="Evert").multiplier;
    return m;
  },[eaters]);
  const eaterLabel=useMemo(()=>{
    const names=[];if(eaters.liisbeth)names.push("Liisbeth");if(eaters.evert)names.push("Evert");
    return names.length===0?"0 inimest":names.join(" + ");
  },[eaters]);
  return(
    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
      <div className="bg-white rounded-xl shadow-2xl max-w-lg w-full max-h-[85vh] flex flex-col">
        <div className="sticky top-0 bg-teal-600 text-white px-6 py-4 flex items-center justify-between rounded-t-xl">
          <h3 className="font-bold text-lg">{recipe.name}</h3>
          <button onClick={onClose} className="hover:bg-teal-700 p-1 rounded transition"><X_ className="w-6 h-6" /></button>
        </div>
        <div className="p-6 overflow-y-auto flex-1">
          <div className="flex flex-wrap gap-4 mb-5 text-sm">
            <div className="bg-teal-50 px-3 py-2 rounded-lg"><span className="text-gray-500">Kalorid:</span> <span className="font-bold text-teal-700">{recipe.kcal} kcal</span></div>
            <div className="bg-orange-50 px-3 py-2 rounded-lg"><span className="text-gray-500">Aeg:</span> <span className="font-bold text-orange-700">{recipe.prepTime} min</span></div>
            <div className="bg-blue-50 px-3 py-2 rounded-lg"><span className="text-gray-500">Tüüp:</span> <span className="font-bold text-blue-700">{recipe.type==="main"?"Põhitoit":recipe.type==="breakfast"?"Hommikusöök":"Snäkk"}</span></div>
          </div>
          <div className="mb-4">
            <div className="flex gap-3 mb-3 text-xs">
              <span className="bg-gray-100 px-2 py-1 rounded">Valk: {recipe.protein}g</span>
              <span className="bg-gray-100 px-2 py-1 rounded">Rasv: {recipe.fat}g</span>
              <span className="bg-gray-100 px-2 py-1 rounded">Süsiv: {recipe.carbs}g</span>
              <span className="bg-gray-100 px-2 py-1 rounded">Kiudaine: {recipe.fiber}g</span>
            </div>
          </div>
          <div className="mb-5 p-3 bg-gray-50 rounded-lg border border-gray-200">
            <p className="text-xs font-semibold text-gray-500 mb-2">Kes sööb?</p>
            <div className="flex gap-4">
              {FAMILY.map(f=>(
                <label key={f.name} className="flex items-center gap-2 cursor-pointer">
                  <div onClick={()=>toggleEater(f.name.toLowerCase())} className={`w-5 h-5 rounded border-2 flex items-center justify-center transition ${eaters[f.name.toLowerCase()]?"bg-teal-500 border-teal-500":"border-gray-300"}`}>{eaters[f.name.toLowerCase()]&&<Check className="w-3 h-3 text-white" />}</div>
                  <span className="text-sm font-medium text-gray-800">{f.name}</span>
                  <span className="text-xs text-gray-400">({f.dailyKcal} kcal/p)</span>
                </label>
              ))}
            </div>
          </div>
          {multiplier>0?<><h4 className="font-bold text-gray-900 mb-3 text-sm">Koostisosad ({eaterLabel}):</h4>
          <div className="space-y-2">
            {ings.map((ing,idx)=>{
              const mQty=typeof ing.qty==="number"?Math.round(ing.qty*multiplier*10)/10:ing.qty;
              return(
                <div key={idx} className="flex items-center justify-between py-2 px-3 rounded-lg bg-teal-50 border border-teal-100">
                  <span className="text-sm text-gray-800">{ing.name}</span>
                  <span className="text-sm font-bold text-teal-700 whitespace-nowrap ml-3">{mQty} {ing.unit}</span>
                </div>
              );
            })}
          </div></>:<p className="text-sm text-gray-400 italic">Vali vähemalt üks sööja.</p>}
          <h4 className="font-bold text-gray-900 mb-3 mt-5 text-sm">Valmistamine:</h4>
          <div className="space-y-2">
            {steps.map((step,idx)=>(
              <div key={idx} className="flex gap-3 py-2 px-3 rounded-lg bg-amber-50 border border-amber-100">
                <span className="text-amber-600 font-bold text-sm shrink-0">{idx+1}.</span>
                <span className="text-sm text-gray-800">{step}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function SavedMenusPanel({savedMenus,onLoad,onDelete,getR,onImport,onExport}){
  const [showImport,setShowImport]=useState(false);const [importText,setImportText]=useState("");const [copyMsg,setCopyMsg]=useState("");const [importErr,setImportErr]=useState("");
  const handleExport=()=>{const json=onExport();navigator.clipboard.writeText(json).then(()=>{setCopyMsg("Kopeeritud!");setTimeout(()=>setCopyMsg(""),2000);}).catch(()=>{setCopyMsg("Kopeeri käsitsi");});};
  const handleImport=()=>{if(!importText.trim()){setImportErr("Kleebi JSON siia.");return;}const ok=onImport(importText.trim());if(ok){setShowImport(false);setImportText("");setImportErr("");}else{setImportErr("Vigane JSON formaat.");}};
  const days=["E","T","K","N","R"];
  return(
    <div className="space-y-4">
      <div className="bg-white rounded-xl shadow-md overflow-hidden">
        <div className="bg-indigo-600 text-white px-6 py-4 flex items-center justify-between">
          <span className="font-bold text-lg flex items-center gap-2"><BookOpen className="w-5 h-5" />Salvestatud menüüd</span>
          <div className="flex items-center gap-2">
            {savedMenus.length>0&&<button onClick={handleExport} className="text-sm bg-indigo-500 hover:bg-indigo-400 px-3 py-1 rounded-full transition">{copyMsg||"Ekspordi"}</button>}
            <button onClick={()=>setShowImport(!showImport)} className="text-sm bg-indigo-500 hover:bg-indigo-400 px-3 py-1 rounded-full transition">Impordi</button>
            <span className="text-sm bg-indigo-700 px-3 py-1 rounded-full">{savedMenus.length}</span>
          </div>
        </div>
        {showImport&&<div className="p-4 bg-indigo-50 border-b border-indigo-200">
          <p className="text-xs text-gray-600 mb-2">Kleebi varem eksporditud JSON:</p>
          <textarea value={importText} onChange={e=>setImportText(e.target.value)} rows={3} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-xs font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder='[{"id":1,"label":"...","plan":{...}}]' />
          {importErr&&<p className="text-xs text-red-500 mt-1">{importErr}</p>}
          <div className="flex gap-2 mt-2">
            <button onClick={handleImport} className="px-4 py-2 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700">Laadi sisse</button>
            <button onClick={()=>{setShowImport(false);setImportText("");setImportErr("");}} className="px-4 py-2 bg-gray-200 text-gray-700 text-sm font-semibold rounded-lg hover:bg-gray-300">Tühista</button>
          </div>
        </div>}
        {savedMenus.length===0?<div className="p-12 text-center"><BookOpen className="w-12 h-12 text-gray-300 mx-auto mb-4" /><p className="text-gray-500 font-medium">Salvestatud menüüsid pole</p><p className="text-gray-400 text-sm mt-2">Vajuta Salvesta nuppu või impordi eelmine menüü.</p></div>
        :<div className="p-4 space-y-4">
          {savedMenus.map(menu=>(
            <div key={menu.id} className="border-2 border-gray-200 rounded-xl overflow-hidden hover:border-indigo-300 transition">
              <div className="bg-gray-50 px-4 py-3 flex items-center justify-between">
                <div><h3 className="font-bold text-gray-900">{menu.label}</h3><p className="text-xs text-gray-500 mt-0.5">Salvestatud: {menu.savedAt}</p></div>
                <div className="flex items-center gap-2">
                  <button onClick={()=>onLoad(menu.plan)} className="flex items-center gap-1.5 px-4 py-2 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700 transition"><Download className="w-4 h-4" />Laadi</button>
                  <button onClick={()=>onDelete(menu.id)} className="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition"><Trash className="w-4 h-4" /></button>
                </div>
              </div>
              <table className="w-full text-sm">
                <thead><tr className="bg-gray-100 border-t border-b border-gray-200">
                  <th className="px-3 py-2 text-left text-xs font-semibold text-gray-600 w-8"></th>
                  <th className="px-3 py-2 text-left text-xs font-semibold text-amber-700">Hommik</th>
                  <th className="px-3 py-2 text-left text-xs font-semibold text-blue-700">Lõuna</th>
                  <th className="px-3 py-2 text-left text-xs font-semibold text-orange-700">Õhtu</th>
                </tr></thead>
                <tbody>{days.map((d,i)=>{const bk=getR(menu.plan.breakfasts[i]);const ln=getR(menu.plan.dinners[i]);const dn=getR(menu.plan.dinners[i+1]);return(
                  <tr key={i} className={i%2===0?"bg-white":"bg-gray-50"}>
                    <td className="px-3 py-2 font-bold text-gray-700">{d}</td>
                    <td className="px-3 py-2 text-gray-800">{bk?.name||"?"}</td>
                    <td className="px-3 py-2 text-gray-800">{ln?.name||"?"}</td>
                    <td className="px-3 py-2 text-gray-800">{dn?.name||"?"}</td>
                  </tr>
                );})}</tbody>
              </table>
            </div>
          ))}
        </div>}
      </div>
    </div>
  );
}

function ShoppingListPanel({items}){
  const [checked,setChecked]=useState({});
  const [extras,setExtras]=useState([]);
  const [newItem,setNewItem]=useState("");
  const toggle=name=>setChecked(p=>({...p,[name]:!p[name]}));
  const allItems=[...items,...extras];
  const checkedCount=Object.values(checked).filter(Boolean).length;
  const cats=["Liha ja kala","Piimatooted","Puu- ja köögivili","Maiustused","Muu"];
  const catColors={"Liha ja kala":"bg-red-100 text-red-800","Piimatooted":"bg-blue-100 text-blue-800","Puu- ja köögivili":"bg-green-100 text-green-800","Maiustused":"bg-pink-100 text-pink-800","Muu":"bg-gray-100 text-gray-800"};
  const grouped=cats.map(cat=>({cat,items:allItems.filter(i=>i.category===cat)})).filter(g=>g.items.length>0);
  const addExtra=()=>{if(!newItem.trim())return;setExtras(p=>[...p,{name:newItem.trim(),quantity:1,unit:"tk",meals:["käsitsi"],category:"Muu"}]);setNewItem("");};
  const removeExtra=name=>setExtras(p=>p.filter(e=>e.name!==name));
  return(
    <div className="bg-white rounded-xl shadow-md overflow-hidden">
      <div className="bg-purple-600 text-white px-6 py-4 flex items-center justify-between">
        <span className="font-bold text-lg">Ostunimekiri</span>
        {checkedCount>0&&<span className="text-sm bg-purple-500 px-3 py-1 rounded-full">{checkedCount} olemas / {allItems.length-checkedCount} osta</span>}
      </div>
      <div className="overflow-x-auto">
        <table className="w-full">
          <thead className="bg-gray-100 border-b border-gray-200"><tr>
            <th className="pl-4 pr-2 py-3 w-10"></th>
            <th className="px-4 py-3 text-left text-sm font-semibold text-gray-700">Koostisosa</th>
            <th className="px-4 py-3 text-right text-sm font-semibold text-gray-700">Kogus</th>
            <th className="px-4 py-3 text-left text-sm font-semibold text-gray-700">Ühik</th>
            <th className="px-4 py-3 text-left text-sm font-semibold text-gray-700">Päev / Söök</th>
          </tr></thead>
          <tbody>
            {grouped.map(g=>{let rowIdx=0;return(
              <>{[<tr key={"cat-"+g.cat}><td colSpan={5} className="px-4 py-2"><span className={`inline-block px-3 py-1 rounded-full text-xs font-bold ${catColors[g.cat]||"bg-gray-100 text-gray-800"}`}>{g.cat} ({g.items.length})</span></td></tr>,
              ...g.items.map(item=>{const done=!!checked[item.name];const isExtra=item.meals[0]==="käsitsi";const ri=rowIdx++;return(
                <tr key={item.name} onClick={()=>toggle(item.name)} className={`cursor-pointer transition ${done?"bg-green-50 opacity-60":ri%2===0?"bg-white hover:bg-gray-100":"bg-gray-50 hover:bg-gray-100"}`}>
                  <td className="pl-4 pr-2 py-3"><div className={`w-5 h-5 rounded border-2 flex items-center justify-center transition ${done?"bg-green-500 border-green-500":"border-gray-300"}`}>{done&&<Check className="w-3 h-3 text-white" />}</div></td>
                  <td className={`px-4 py-3 ${done?"line-through text-gray-400":"text-gray-900"}`}>
                    <div className="flex items-center gap-2">{item.name}{isExtra&&<button onClick={e=>{e.stopPropagation();removeExtra(item.name);}} className="text-red-400 hover:text-red-600"><X_ className="w-3 h-3" /></button>}</div>
                  </td>
                  <td className={`px-4 py-3 text-right font-semibold ${done?"line-through text-gray-400":"text-gray-900"}`}>{typeof item.quantity==="number"?item.unit==="tk"?item.quantity:item.quantity.toFixed(1):item.quantity}</td>
                  <td className={`px-4 py-3 ${done?"text-gray-400":"text-gray-700"}`}>{item.unit}</td>
                  <td className={`px-4 py-3 text-xs ${done?"text-gray-400":"text-gray-500"}`}>{item.meals.join(", ")}</td>
                </tr>
              );})]}
              </>
            );})}
          </tbody>
        </table>
      </div>
      <div className="px-6 py-4 border-t border-gray-200">
        <div className="flex gap-2 items-center">
          <input type="text" value={newItem} onChange={e=>setNewItem(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addExtra();}} placeholder="Lisa toode (nt: piim, leib...)" className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-purple-500" />
          <button onClick={addExtra} className="px-4 py-2 bg-purple-600 text-white text-sm font-semibold rounded-lg hover:bg-purple-700 transition"><Plus className="w-4 h-4" /></button>
        </div>
      </div>
      <div className="bg-gray-50 px-6 py-4 border-t border-gray-200 text-sm text-gray-600 flex items-center justify-between">
        <span>Kokku {allItems.length} koostisosa (2 inimese kohta)</span>
        {checkedCount>0&&<button onClick={()=>setChecked({})} className="text-purple-600 hover:text-purple-800 text-sm font-medium">Tühjenda valikud</button>}
      </div>
    </div>
  );
}
